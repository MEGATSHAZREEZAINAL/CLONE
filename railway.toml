[build]
  builder = "NIXPACKS"
  buildCommand = "pip install -r requirements.txt && playwright install chromium"

[deploy]
  startCommand = "python web_server.py"
  healthcheckPath = "/health"
  healthcheckTimeout = 300
  restartPolicyType = "ON_FAILURE"

[env]
  PYTHONUNBUFFERED = "1"
  DISPLAY = ":99"